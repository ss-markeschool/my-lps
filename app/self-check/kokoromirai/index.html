<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お悩み自己診断</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --ink: #2a2521;
      --muted: #746b63;
      --panel: #ffffff;
      --line: #ded6cc;
      --primary: #0f7b78;
      --primary-dark: #095f5d;
      --secondary: #b45a6a;
      --soft: #eef7f6;
      --soft-pink: #fff1f4;
      --shadow: 0 18px 48px rgba(42, 37, 33, 0.12);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 123, 120, 0.12), transparent 42%),
        linear-gradient(315deg, rgba(180, 90, 106, 0.12), transparent 38%),
        var(--bg);
    }

    button,
    a {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .shell {
      width: min(900px, 100%);
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-weight: 700;
      letter-spacing: 0;
    }

    .mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 8px 20px rgba(15, 123, 120, 0.25);
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(222, 214, 204, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .screen {
      display: none;
      padding: clamp(22px, 5vw, 46px);
    }

    .screen.active {
      display: block;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
      line-height: 1.35;
    }

    h1 {
      font-size: clamp(30px, 6vw, 54px);
    }

    h2 {
      font-size: clamp(24px, 4vw, 38px);
    }

    p {
      margin: 0;
      line-height: 1.9;
    }

    .lead {
      max-width: 680px;
      margin-top: 18px;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
    }

    .start-actions,
    .answer-actions,
    .result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 12px 22px;
      color: #fff;
      background: var(--primary);
      text-decoration: none;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--primary-dark);
      box-shadow: 0 10px 24px rgba(15, 123, 120, 0.23);
      transform: translateY(-1px);
      outline: none;
    }

    .btn.secondary {
      color: var(--primary-dark);
      background: #fff;
      border-color: var(--line);
    }

    .btn.secondary:hover,
    .btn.secondary:focus-visible {
      background: var(--soft);
    }

    .btn.accent {
      background: var(--secondary);
    }

    .btn.accent:hover,
    .btn.accent:focus-visible {
      background: #964658;
      box-shadow: 0 10px 24px rgba(180, 90, 106, 0.23);
    }

    .progress {
      display: grid;
      gap: 10px;
      margin-bottom: 28px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .meter {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #ebe4dc;
    }

    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width 240ms ease;
    }

    .question {
      min-height: 150px;
      display: grid;
      align-content: center;
      padding: clamp(20px, 4vw, 32px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff, #fffaf6);
    }

    .question-label {
      margin-bottom: 10px;
      color: var(--primary-dark);
      font-size: 14px;
      font-weight: 700;
    }

    .question-text {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 700;
      line-height: 1.45;
    }

    .answer-actions .btn {
      flex: 1 1 180px;
      min-height: 60px;
      font-size: 20px;
      font-weight: 700;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 26px;
    }

    .score {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .score span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .score strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
    }

    .message {
      margin-top: 22px;
      padding: 20px;
      border-left: 5px solid var(--primary);
      border-radius: 8px;
      background: var(--soft);
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700;
      line-height: 1.65;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
    }

    .method-box {
      margin-top: 24px;
      padding: clamp(22px, 4vw, 34px);
      border: 1px solid #f0cbd3;
      border-radius: 8px;
      background: var(--soft-pink);
    }

    .method-name {
      margin-top: 12px;
      color: var(--secondary);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.35;
    }

    .method-lead {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .screen {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <header class="topbar" aria-label="アプリ情報">
        <div class="brand">
          <span class="mark" aria-hidden="true">心</span>
          <span>お悩み自己診断</span>
        </div>
        <span>40問・はい / いいえ</span>
      </header>

      <section class="panel" aria-live="polite">
        <div id="startScreen" class="screen active">
          <h1>今のお悩みの奥にあるものを見つける自己診断</h1>
          <p class="lead">40個の設問がランダムに1問ずつ表示されます。直感に近い感覚で「はい」「いいえ」を選んでください。</p>
          <div class="start-actions">
            <button id="startButton" class="btn" type="button">診断をはじめる</button>
          </div>
        </div>

        <div id="questionScreen" class="screen">
          <div class="progress" aria-label="進行状況">
            <div class="progress-row">
              <span id="progressText">1 / 40</span>
              <span id="answeredText">回答中</span>
            </div>
            <div class="meter" aria-hidden="true"><div id="progressBar" class="bar"></div></div>
          </div>

          <div class="question">
            <div class="question-label">この項目に当てはまりますか？</div>
            <div id="questionText" class="question-text"></div>
          </div>

          <div class="answer-actions">
            <button class="btn accent" type="button" data-answer="yes">はい</button>
            <button class="btn secondary" type="button" data-answer="no">いいえ</button>
          </div>
        </div>

        <div id="resultScreen" class="screen">
          <h2>診断結果</h2>
          <div id="resultMessage" class="message"></div>
          <div class="summary" aria-label="はいの数">
            <div class="score"><span>A 過去・感情・心の癖</span><strong id="scoreA">0</strong></div>
            <div class="score"><span>B エネルギー不足</span><strong id="scoreB">0</strong></div>
            <div class="score"><span>C 未来・現実の捉え方</span><strong id="scoreC">0</strong></div>
          </div>
          <p class="note">そのお悩みを解消するのに必要なのは「ここをタップする」と分かります。</p>
          <div class="result-actions">
            <button id="showMethodButton" class="btn" type="button">ここをタップする</button>
            <button id="retryButton" class="btn secondary" type="button">もう一度診断する</button>
          </div>
        </div>

        <div id="methodScreen" class="screen">
          <h2>解消方法</h2>
          <div class="method-box">
            <div class="method-lead">今の結果に連動したおすすめ</div>
            <div id="methodName" class="method-name"></div>
          </div>
          <div class="result-actions">
            <a id="detailLink" class="btn accent" href="https://example.com/" target="_blank" rel="noopener">詳しくはこちら</a>
            <button id="backToResultButton" class="btn secondary" type="button">結果に戻る</button>
            <button id="retryButton2" class="btn secondary" type="button">もう一度診断する</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const DETAIL_URLS = {
      A: "https://example.com/",
      B: "https://example.com/",
      C: "https://example.com/",
      AB: "https://example.com/",
      AC: "https://example.com/",
      BC: "https://example.com/",
      ABC: "https://example.com/",
      NONE: "https://example.com/"
    };

    const questions = [
      { group: "A", text: "過去を引きずってしまう" },
      { group: "A", text: "人間関係に疲れている" },
      { group: "A", text: "自分責めがやめられない" },
      { group: "A", text: "過去を思い出して苦しくなる" },
      { group: "A", text: "人間関係がうまくいかない" },
      { group: "A", text: "自分責めが止まらない" },
      { group: "A", text: "本音を言えない・我慢してしまう" },
      { group: "A", text: "トラウマ体験が心に残っている" },
      { group: "A", text: "何かが原因で自分をブロックしている" },
      { group: "A", text: "同じような問題が繰り返し起きる" },
      { group: "A", text: "感情のコントロールが苦手" },
      { group: "A", text: "自信が持てず、自己否定が強い" },
      { group: "A", text: "人に合わせすぎて疲れてしまう" },
      { group: "B", text: "疲れやすく、気力が出ない" },
      { group: "B", text: "癒されたいと思っている" },
      { group: "B", text: "敏感で、気を使いすぎてしまう" },
      { group: "B", text: "疲れやすく、やる気が出ない" },
      { group: "B", text: "気を使いすぎて疲れてしまう" },
      { group: "B", text: "自分を整えたいと感じる" },
      { group: "B", text: "自分を大切にできていない" },
      { group: "B", text: "エネルギーがいつも枯渇している" },
      { group: "B", text: "睡眠の質が悪く、朝スッキリしない" },
      { group: "B", text: "考えすぎて頭が休まらない" },
      { group: "B", text: "体調を崩しやすい・不調が続く" },
      { group: "B", text: "自分のことは後回しになりがち" },
      { group: "B", text: "感情に振り回されやすい" },
      { group: "C", text: "現実を変えたい" },
      { group: "C", text: "豊かさを受け取りたい" },
      { group: "C", text: "将来がなんとなく不安" },
      { group: "C", text: "頑張っているのに変わらない" },
      { group: "C", text: "将来が不安で仕方ない" },
      { group: "C", text: "豊かさを受け取りたい" },
      { group: "C", text: "もっと自分らしく輝きたい" },
      { group: "C", text: "理想の未来が描けていない" },
      { group: "C", text: "引き寄せがうまくいかないと感じる" },
      { group: "C", text: "お金のブロックがある" },
      { group: "C", text: "変わりたいのに行動が続かない" },
      { group: "C", text: "自分の可能性を信じられない" },
      { group: "C", text: "自分責めをしてしまう" },
      { group: "C", text: "人間関係を改善したい" }
    ];

    const resultMap = {
      A: {
        message: "『過去・感情・心の癖』に今のお悩みの奥にあるかもしれません",
        method: "心の浄化"
      },
      B: {
        message: "『エネルギー不足・整っていないこと』に今のお悩みの奥にあるかもしれません",
        method: "レイキヒーリング"
      },
      C: {
        message: "『現実の捉え方・未来の描き方』に今のお悩みの奥にあるかもしれません",
        method: "量子力学生活"
      },
      AB: {
        message: "『過去・感情・心の癖』『エネルギー不足・整っていないこと』に今のお悩みの奥にあるかもしれません",
        method: "心の浄化とレイキヒーリング"
      },
      AC: {
        message: "『過去・感情・心の癖』『現実の捉え方・未来の描き方』に今のお悩みの奥にあるかもしれません",
        method: "心の浄化と量子力学生活"
      },
      BC: {
        message: "『エネルギー不足・整っていないこと』『現実の捉え方・未来の描き方』に今のお悩みの奥にあるかもしれません",
        method: "レイキヒーリングと量子力学生活"
      },
      ABC: {
        message: "『過去・感情・心の癖』『エネルギー不足・整っていないこと』『現実の捉え方・未来の描き方』に今のお悩みの奥にあるかもしれません",
        method: "心の浄化とレイキヒーリングと量子力学生活"
      },
      NONE: {
        message: "今回は5個以上当てはまる項目がありませんでした。今は大きく偏った原因よりも、日々の状態をやさしく観察するタイミングかもしれません",
        method: "セルフケアの見直し"
      }
    };

    const state = {
      order: [],
      index: 0,
      scores: { A: 0, B: 0, C: 0 },
      resultKey: "NONE"
    };

    const screens = {
      start: document.getElementById("startScreen"),
      question: document.getElementById("questionScreen"),
      result: document.getElementById("resultScreen"),
      method: document.getElementById("methodScreen")
    };

    const questionText = document.getElementById("questionText");
    const progressText = document.getElementById("progressText");
    const answeredText = document.getElementById("answeredText");
    const progressBar = document.getElementById("progressBar");
    const resultMessage = document.getElementById("resultMessage");
    const scoreA = document.getElementById("scoreA");
    const scoreB = document.getElementById("scoreB");
    const scoreC = document.getElementById("scoreC");
    const methodName = document.getElementById("methodName");
    const detailLink = document.getElementById("detailLink");

    function shuffle(items) {
      const shuffled = [...items];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function showScreen(name) {
      Object.values(screens).forEach((screen) => screen.classList.remove("active"));
      screens[name].classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startDiagnosis() {
      state.order = shuffle(questions);
      state.index = 0;
      state.scores = { A: 0, B: 0, C: 0 };
      state.resultKey = "NONE";
      showScreen("question");
      renderQuestion();
    }

    function renderQuestion() {
      const current = state.order[state.index];
      const currentNumber = state.index + 1;
      questionText.textContent = current.text;
      progressText.textContent = `${currentNumber} / ${state.order.length}`;
      answeredText.textContent = `回答済み ${state.index}問`;
      progressBar.style.width = `${(state.index / state.order.length) * 100}%`;
    }

    function answerQuestion(answer) {
      const current = state.order[state.index];
      if (answer === "yes") {
        state.scores[current.group] += 1;
      }

      state.index += 1;
      if (state.index >= state.order.length) {
        progressBar.style.width = "100%";
        renderResult();
        return;
      }

      renderQuestion();
    }

    function getResultKey() {
      return ["A", "B", "C"].filter((group) => state.scores[group] >= 5).join("") || "NONE";
    }

    function renderResult() {
      state.resultKey = getResultKey();
      const result = resultMap[state.resultKey];
      resultMessage.textContent = result.message;
      scoreA.textContent = `${state.scores.A}個`;
      scoreB.textContent = `${state.scores.B}個`;
      scoreC.textContent = `${state.scores.C}個`;
      methodName.textContent = result.method;
      detailLink.href = DETAIL_URLS[state.resultKey] || DETAIL_URLS.NONE;
      showScreen("result");
    }

    document.getElementById("startButton").addEventListener("click", startDiagnosis);
    document.getElementById("retryButton").addEventListener("click", startDiagnosis);
    document.getElementById("retryButton2").addEventListener("click", startDiagnosis);
    document.getElementById("showMethodButton").addEventListener("click", () => showScreen("method"));
    document.getElementById("backToResultButton").addEventListener("click", () => showScreen("result"));

    document.querySelectorAll("[data-answer]").forEach((button) => {
      button.addEventListener("click", () => answerQuestion(button.dataset.answer));
    });
  </script>
</body>
</html>
