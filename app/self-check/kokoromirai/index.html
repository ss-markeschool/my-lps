<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>心と体のエネルギー自己診断</title>
  <style>
    :root {
      --page: #f3f0ec;
      --card: #ffffff;
      --ink: #344155;
      --muted: #8792a3;
      --line: #edf1f5;
      --teal: #19b9aa;
      --teal-dark: #12a99b;
      --pink: #fa657d;
      --pink-dark: #f34263;
      --gray-button: #e9eef4;
      --result-bg: #effdfa;
      --result-line: #cdf7ee;
      --method-bg: #fff6f8;
      --method-line: #edf0f3;
      --gold-bg: #fff4bf;
      --gold: #f4a000;
      --shadow: 0 18px 34px rgba(42, 49, 58, 0.15);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      color: var(--ink);
      background: var(--page);
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 30px);
    }

    .phone-card {
      width: min(720px, 100%);
      min-height: min(92vh, 980px);
      display: grid;
      background: var(--card);
      border: 1px solid #edf1f4;
      border-radius: clamp(28px, 4vw, 44px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .screen {
      display: none;
      min-height: inherit;
      padding: clamp(38px, 7vw, 70px) clamp(34px, 7vw, 62px);
    }

    .screen.active {
      display: grid;
    }

    .start-screen {
      align-content: center;
      text-align: center;
    }

    .icon-circle {
      width: clamp(92px, 17vw, 138px);
      height: clamp(92px, 17vw, 138px);
      display: grid;
      place-items: center;
      margin: 0 auto clamp(28px, 5vw, 44px);
      border-radius: 50%;
      background: #ecfbf8;
      color: var(--teal);
    }

    .icon-circle.gold {
      width: clamp(92px, 15vw, 116px);
      height: clamp(92px, 15vw, 116px);
      margin-bottom: clamp(26px, 5vw, 42px);
      color: var(--gold);
      background: var(--gold-bg);
    }

    .icon-circle svg {
      width: 48%;
      height: 48%;
      stroke: currentColor;
      stroke-width: 3.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1,
    h2 {
      margin: 0;
      color: var(--ink);
      letter-spacing: 0;
      line-height: 1.35;
    }

    h1 {
      font-size: clamp(34px, 6.5vw, 56px);
      font-weight: 800;
    }

    h2 {
      font-size: clamp(30px, 5vw, 44px);
      font-weight: 800;
      text-align: center;
    }

    p {
      margin: 0;
      line-height: 1.85;
    }

    .lead {
      max-width: 600px;
      margin: clamp(28px, 5vw, 44px) auto 0;
      color: var(--muted);
      font-size: clamp(18px, 3.2vw, 25px);
      font-weight: 600;
      text-align: center;
    }

    .actions {
      display: grid;
      gap: 20px;
      margin-top: clamp(42px, 7vw, 74px);
    }

    .btn {
      min-height: clamp(66px, 10vw, 88px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 0;
      border-radius: 22px;
      padding: 18px 24px;
      color: #fff;
      background: var(--teal);
      box-shadow: 0 12px 20px rgba(31, 48, 64, 0.12);
      font-size: clamp(24px, 4.5vw, 34px);
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--teal-dark);
      box-shadow: 0 15px 24px rgba(31, 48, 64, 0.16);
      outline: none;
      transform: translateY(-1px);
    }

    .btn.pink {
      background: var(--pink);
    }

    .btn.pink:hover,
    .btn.pink:focus-visible {
      background: var(--pink-dark);
    }

    .btn.gray {
      color: #5b6068;
      background: var(--gray-button);
      box-shadow: none;
      font-size: clamp(16px, 2.8vw, 24px);
    }

    .btn.gray:hover,
    .btn.gray:focus-visible {
      background: #dde5ee;
    }

    .question-screen {
      align-content: stretch;
      grid-template-rows: auto 1fr auto;
    }

    .question-top {
      display: grid;
      gap: 18px;
    }

    .question-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
    }

    .question-label {
      color: #9aa6b5;
      font-size: clamp(24px, 4.2vw, 34px);
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .question-count {
      color: #a5afbf;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 800;
      white-space: nowrap;
    }

    .question-count strong {
      color: var(--teal);
      font-size: 1.45em;
    }

    .meter {
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: #eff4f8;
    }

    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--teal);
      transition: width 220ms ease;
    }

    .question-body {
      display: grid;
      place-items: center;
      padding: clamp(50px, 10vw, 120px) 0;
      text-align: center;
    }

    .question-text {
      color: var(--ink);
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 800;
      line-height: 1.45;
    }

    .answer-actions {
      display: grid;
      gap: clamp(18px, 3vw, 28px);
    }

    .answer-actions .btn.gray {
      min-height: clamp(66px, 10vw, 88px);
      font-size: clamp(24px, 4.5vw, 34px);
    }

    .result-screen {
      align-content: center;
      text-align: center;
    }

    .result-card {
      margin-top: clamp(34px, 6vw, 56px);
      padding: clamp(28px, 5vw, 48px) clamp(20px, 5vw, 38px);
      border: 2px solid var(--result-line);
      border-radius: 26px;
      color: #129f94;
      background: var(--result-bg);
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 800;
      line-height: 1.85;
    }

    .result-card span {
      display: block;
    }

    .result-note {
      max-width: 560px;
      margin: clamp(42px, 7vw, 72px) auto 0;
      color: var(--ink);
      font-size: clamp(20px, 3.8vw, 30px);
      font-weight: 500;
      line-height: 1.8;
      text-align: center;
    }

    .result-actions {
      display: grid;
      gap: 18px;
      margin-top: clamp(28px, 5vw, 48px);
    }

    .method-screen {
      align-content: center;
      text-align: center;
    }

    .method-heading {
      color: var(--ink);
      font-size: clamp(25px, 4.5vw, 38px);
      font-weight: 800;
    }

    .method-box {
      min-height: clamp(200px, 32vw, 310px);
      display: grid;
      place-items: center;
      margin-top: clamp(46px, 7vw, 76px);
      padding: clamp(28px, 5vw, 52px);
      border: 2px solid var(--method-line);
      border-radius: 34px;
      background: var(--method-bg);
    }

    .method-name {
      color: #e82955;
      font-size: clamp(32px, 6vw, 54px);
      font-weight: 800;
      line-height: 1.75;
    }

    .method-actions {
      display: grid;
      gap: 18px;
      margin-top: clamp(54px, 9vw, 92px);
    }

    .method-sub-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .method-sub-actions .btn {
      min-height: clamp(52px, 8vw, 70px);
      border-radius: 16px;
      padding-inline: 12px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .phone-card {
        min-height: calc(100vh - 24px);
        border-radius: 28px;
      }

      .screen {
        padding: 34px 24px;
      }

      .method-sub-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="phone-card" aria-live="polite">
      <div id="startScreen" class="screen start-screen active">
        <div class="icon-circle" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <path d="M24 39S8 28.5 8 17.5C8 12.3 11.9 9 16.5 9c2.9 0 5.6 1.5 7.5 4 1.9-2.5 4.6-4 7.5-4C36.1 9 40 12.3 40 17.5 40 28.5 24 39 24 39Z"></path>
          </svg>
        </div>
        <h1>心と体のエネルギー<br>自己診断</h1>
        <p class="lead">40個の質問に直感で「Yes」か「No」でお答えください。<br>今のお悩みの奥にある原因と、それを解消するための方法が分かります。</p>
        <div class="actions">
          <button id="startButton" class="btn" type="button">診断をはじめる</button>
        </div>
      </div>

      <div id="questionScreen" class="screen question-screen">
        <div class="question-top" aria-label="進行状況">
          <div class="question-row">
            <div class="question-label">QUESTION</div>
            <div id="progressText" class="question-count"><strong>1</strong> / 40</div>
          </div>
          <div class="meter" aria-hidden="true"><div id="progressBar" class="bar"></div></div>
          <div id="answeredText" class="visually-hidden">回答中</div>
        </div>

        <div class="question-body">
          <div id="questionText" class="question-text"></div>
        </div>

        <div class="answer-actions">
          <button class="btn pink" type="button" data-answer="yes">はい</button>
          <button class="btn gray" type="button" data-answer="no">いいえ</button>
        </div>
      </div>

      <div id="resultScreen" class="screen result-screen">
        <div class="icon-circle gold" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <path d="M26 5l4.7 12.3L43 22l-12.3 4.7L26 39l-4.7-12.3L9 22l12.3-4.7L26 5Z"></path>
            <path d="M10 8v7"></path>
            <path d="M6.5 11.5h7"></path>
            <path d="M12 32v8"></path>
            <path d="M8 36h8"></path>
          </svg>
        </div>
        <h2>診断結果</h2>
        <div id="resultMessage" class="result-card"></div>
        <p class="result-note">お悩みの奥にあるものを<br>解消するには下のボタンの<br>「つづきを見る」をタップしてください。</p>
        <div class="result-actions">
          <button id="showMethodButton" class="btn pink" type="button">つづきを見る</button>
        </div>
      </div>

      <div id="methodScreen" class="screen method-screen">
        <div class="method-heading">あなたに必要な解消方法は…</div>
        <div class="method-box">
          <div id="methodName" class="method-name"></div>
        </div>
        <div class="method-actions">
          <a id="detailLink" class="btn" href="https://example.com/" target="_blank" rel="noopener">詳しくはこちら</a>
          <div class="method-sub-actions">
            <button id="backToResultButton" class="btn gray" type="button">診断の結果に戻る</button>
            <button id="retryButton" class="btn gray" type="button">最初からやり直す</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const DETAIL_URLS = {
      A: "https://example.com/",
      B: "https://example.com/",
      C: "https://example.com/",
      AB: "https://example.com/",
      AC: "https://example.com/",
      BC: "https://example.com/",
      ABC: "https://example.com/",
      NONE: "https://example.com/"
    };

    const questions = [
      { group: "A", text: "過去を引きずってしまう" },
      { group: "A", text: "人間関係に疲れている" },
      { group: "A", text: "自分責めがやめられない" },
      { group: "A", text: "過去を思い出して苦しくなる" },
      { group: "A", text: "人間関係がうまくいかない" },
      { group: "A", text: "自分責めが止まらない" },
      { group: "A", text: "本音を言えない・我慢してしまう" },
      { group: "A", text: "トラウマ体験が心に残っている" },
      { group: "A", text: "何かが原因で自分をブロックしている" },
      { group: "A", text: "同じような問題が繰り返し起きる" },
      { group: "A", text: "感情のコントロールが苦手" },
      { group: "A", text: "自信が持てず、自己否定が強い" },
      { group: "A", text: "人に合わせすぎて疲れてしまう" },
      { group: "B", text: "疲れやすく、気力が出ない" },
      { group: "B", text: "癒されたいと思っている" },
      { group: "B", text: "敏感で、気を使いすぎてしまう" },
      { group: "B", text: "疲れやすく、やる気が出ない" },
      { group: "B", text: "気を使いすぎて疲れてしまう" },
      { group: "B", text: "自分を整えたいと感じる" },
      { group: "B", text: "自分を大切にできていない" },
      { group: "B", text: "エネルギーがいつも枯渇している" },
      { group: "B", text: "睡眠の質が悪く、朝スッキリしない" },
      { group: "B", text: "考えすぎて頭が休まらない" },
      { group: "B", text: "体調を崩しやすい・不調が続く" },
      { group: "B", text: "自分のことは後回しになりがち" },
      { group: "B", text: "感情に振り回されやすい" },
      { group: "C", text: "現実を変えたい" },
      { group: "C", text: "豊かさを受け取りたい" },
      { group: "C", text: "将来がなんとなく不安" },
      { group: "C", text: "頑張っているのに変わらない" },
      { group: "C", text: "将来が不安で仕方ない" },
      { group: "C", text: "豊かさを受け取りたい" },
      { group: "C", text: "もっと自分らしく輝きたい" },
      { group: "C", text: "理想の未来が描けていない" },
      { group: "C", text: "引き寄せがうまくいかないと感じる" },
      { group: "C", text: "お金のブロックがある" },
      { group: "C", text: "変わりたいのに行動が続かない" },
      { group: "C", text: "自分の可能性を信じられない" },
      { group: "C", text: "自分責めをしてしまう" },
      { group: "C", text: "人間関係を改善したい" }
    ];

    const resultMap = {
      A: {
        factors: ["『過去・感情・心の癖』"],
        method: "心の浄化"
      },
      B: {
        factors: ["『エネルギー不足・整っていないこと』"],
        method: "レイキヒーリング"
      },
      C: {
        factors: ["『現実の捉え方・未来の描き方』"],
        method: "量子力学生活"
      },
      AB: {
        factors: ["『過去・感情・心の癖』", "『エネルギー不足・整っていないこと』"],
        method: "心の浄化と<br>レイキヒーリング"
      },
      AC: {
        factors: ["『過去・感情・心の癖』", "『現実の捉え方・未来の描き方』"],
        method: "心の浄化と<br>量子力学生活"
      },
      BC: {
        factors: ["『エネルギー不足・整っていないこと』", "『現実の捉え方・未来の描き方』"],
        method: "レイキヒーリングと<br>量子力学生活"
      },
      ABC: {
        factors: ["『過去・感情・心の癖』", "『エネルギー不足・整っていないこと』", "『現実の捉え方・未来の描き方』"],
        method: "心の浄化と<br>レイキヒーリングと<br>量子力学生活"
      },
      NONE: {
        factors: ["今回は5個以上当てはまる項目がありませんでした"],
        suffix: "日々の状態をやさしく観察するタイミングかもしれません",
        method: "セルフケアの見直し"
      }
    };

    const state = {
      order: [],
      index: 0,
      scores: { A: 0, B: 0, C: 0 },
      resultKey: "NONE"
    };

    const screens = {
      start: document.getElementById("startScreen"),
      question: document.getElementById("questionScreen"),
      result: document.getElementById("resultScreen"),
      method: document.getElementById("methodScreen")
    };

    const questionText = document.getElementById("questionText");
    const progressText = document.getElementById("progressText");
    const answeredText = document.getElementById("answeredText");
    const progressBar = document.getElementById("progressBar");
    const resultMessage = document.getElementById("resultMessage");
    const methodName = document.getElementById("methodName");
    const detailLink = document.getElementById("detailLink");

    function shuffle(items) {
      const shuffled = [...items];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function showScreen(name) {
      Object.values(screens).forEach((screen) => screen.classList.remove("active"));
      screens[name].classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startDiagnosis() {
      state.order = shuffle(questions);
      state.index = 0;
      state.scores = { A: 0, B: 0, C: 0 };
      state.resultKey = "NONE";
      showScreen("question");
      renderQuestion();
    }

    function renderQuestion() {
      const current = state.order[state.index];
      const currentNumber = state.index + 1;
      questionText.textContent = current.text;
      progressText.innerHTML = `<strong>${currentNumber}</strong> / ${state.order.length}`;
      answeredText.textContent = `回答済み ${state.index}問`;
      progressBar.style.width = `${(state.index / state.order.length) * 100}%`;
    }

    function answerQuestion(answer) {
      const current = state.order[state.index];
      if (answer === "yes") {
        state.scores[current.group] += 1;
      }

      state.index += 1;
      if (state.index >= state.order.length) {
        progressBar.style.width = "100%";
        renderResult();
        return;
      }

      renderQuestion();
    }

    function getResultKey() {
      return ["A", "B", "C"].filter((group) => state.scores[group] >= 5).join("") || "NONE";
    }

    function renderResult() {
      state.resultKey = getResultKey();
      const result = resultMap[state.resultKey];
      const suffix = result.suffix || "に今のお悩みの奥にあるかもしれません";
      resultMessage.innerHTML = `${result.factors.map((factor) => `<span>${factor}</span>`).join("")}<span>${suffix}</span>`;
      methodName.innerHTML = result.method;
      detailLink.href = DETAIL_URLS[state.resultKey] || DETAIL_URLS.NONE;
      showScreen("result");
    }

    document.getElementById("startButton").addEventListener("click", startDiagnosis);
    document.getElementById("retryButton").addEventListener("click", startDiagnosis);
    document.getElementById("showMethodButton").addEventListener("click", () => showScreen("method"));
    document.getElementById("backToResultButton").addEventListener("click", () => showScreen("result"));

    document.querySelectorAll("[data-answer]").forEach((button) => {
      button.addEventListener("click", () => answerQuestion(button.dataset.answer));
    });
  </script>
</body>
</html>
